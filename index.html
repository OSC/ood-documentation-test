<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OOD Documentation</title>
</head>

<body>
  <ul>
  </ul>

  If your browser doesn't automatically redirect you to the documentation page,
  then please access the  <a href="master/">Documentation</a> directly.
<script>
var xhr = new XMLHttpRequest();

xhr.onreadystatechange = function(){
  if (xhr.readyState === XMLHttpRequest.DONE && xhr.status === 200) {
    var jsonResponse = JSON.parse(xhr.responseText());
    
    jsonResponse.forEach(f => {
      if(f.type === "dir"){
        var url = "https://osc.github.io/ood-documentation-test/" + f.name + "/";

        var li = document.createElement("li");
        li.innerHTML = '<a href="' + url +'">'+f.name+'</a>';
        document.querySelector('ul').append(li);
      }
    });
  }
};
  
xhr.open('GET', 'https://api.github.com/repos/osc/ood-documentation-test/contents?ref=gh-pages', true)
xhr.send();
</script>
</body>
</html>
